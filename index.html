<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);font-family:'Lato',sans-serif;font-size:16px;min-height:100vh;padding:20px;color:#2d3436}

    h2{font-size:1.4rem;font-weight:700}
    h3{font-size:1.1rem;font-weight:700}
    .wrap{max-width:900px;margin:0 auto}
    .header{text-align:center;margin-bottom:24px}
    .header p{font-size:1.1rem;color:#555;margin:6px 0 10px}
    .badge{background:#fdcb6e;border-radius:20px;padding:5px 16px;font-size:1rem;font-weight:700;color:#2d3436}
    .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
    .tab{padding:10px 20px;border-radius:25px;border:none;cursor:pointer;font-size:1rem;font-weight:700;font-family:'Lato',sans-serif;background:white;color:#2d3436;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:all .2s}
    .tab.active{background:#2d3436;color:white;box-shadow:0 4px 12px rgba(0,0,0,.2)}
    .view{display:none}.view.active{display:block}
    .filters{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
    .fbtn{padding:8px 18px;border-radius:20px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;font-family:'Lato',sans-serif;background:white;color:#2d3436;box-shadow:0 2px 6px rgba(0,0,0,.08)}
    .fbtn.active{box-shadow:0 3px 10px rgba(0,0,0,.15)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
    .pcard{background:white;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.09);cursor:pointer;transition:transform .2s,box-shadow .2s}
    .pcard:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.14)}
    .pcard-img{width:100%;height:160px;object-fit:cover;display:block;background:#f0f4f0}
    .pcard-placeholder{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#f0f4f0,#e8f5e9)}
    .pinfo{padding:14px}
    .pname{font-size:1.1rem;font-weight:700;margin-bottom:4px}
    .pmeta{font-size:.9rem;color:#636e72;margin-bottom:6px}
    .ptip{font-size:.9rem;color:#555;font-style:italic;margin-top:6px}
    .sbadge{display:inline-block;font-size:.8rem;font-weight:700;border-radius:12px;padding:2px 10px;margin:2px 2px 0 0}
    .detail{display:none;gap:20px;padding:20px;border-radius:14px;margin-bottom:20px;flex-wrap:wrap;align-items:flex-start}
    .detail.show{display:flex}
    .detail-img{width:140px;height:140px;object-fit:cover;border-radius:12px;flex-shrink:0;background:#f0f4f0}
    .detail-placeholder{width:140px;height:140px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#f0f4f0,#e8f5e9);display:flex;align-items:center;justify-content:center;font-size:56px}
    .detail-info{flex:1;min-width:180px}
    .closebtn{margin-top:12px;padding:6px 16px;border-radius:20px;border:none;background:#dfe6e9;cursor:pointer;font-family:'Lato',sans-serif;font-size:.95rem}
    .visual-wrap{background:white;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .jasmine-bar{background:linear-gradient(90deg,#27ae60,#2ecc71);border-radius:10px;padding:14px 20px;text-align:center;color:white;font-weight:700;font-size:1.1rem;margin-bottom:16px}
    .scard{background:white;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 3px 12px rgba(0,0,0,.07)}
    .sitems{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0}
    .sitem{display:flex;align-items:center;gap:10px;background:#f5f6fa;border-radius:12px;padding:8px 14px;font-size:1rem;font-weight:600}
    .sitem-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:#f0f4f0}
    .snote{background:#f5f6fa;border-radius:10px;padding:10px 14px;color:#555}
    .progress-wrap{background:white;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 3px 12px rgba(0,0,0,.07)}
    .prog-bar{background:#e0e0e0;border-radius:8px;height:10px;margin-top:8px;overflow:hidden}
    .prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#00b894,#00cec9);transition:width .4s}
    .prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .prog-score{font-size:1.2rem;font-weight:700;color:#00b894}
    .cathead{font-size:1rem;font-weight:700;color:#636e72;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px 4px}
    .crow{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;border-radius:12px;margin-bottom:10px;background:#f8f9fa;border:2px solid transparent;cursor:pointer;transition:all .2s}
    .crow:hover{background:#f0f4f0;border-color:#00b894}
    .crow.done{background:#f0fff4;border-color:#00b89444;opacity:.75}
    .crow.done .ctxt{text-decoration:line-through;color:#aaa}
    .crow.done .csub{text-decoration:line-through;color:#bbb}
    .cb{width:24px;height:24px;border-radius:6px;border:2.5px solid #b2bec3;background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
    .cb.on{background:#00b894;border-color:#00b894}
    .ctxt{font-size:1rem;font-weight:600}
    .csub{font-size:.88rem;color:#636e72;margin-top:2px}
    .shrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;background:#f8f9fa;border:2px solid transparent;cursor:pointer;transition:all .2s}
    .shrow:hover{background:#fff9e6;border-color:#fdcb6e}
    .shrow.bought{background:#f0fff4;border-color:#00b89444;opacity:.7}
    .shrow.bought .ctxt{text-decoration:line-through;color:#aaa}
    .shrow.bought .price{text-decoration:line-through;color:#aaa}
    .shimg{width:44px;height:44px;border-radius:8px;object-fit:cover;background:#f0f4f0}
    .shicon{width:44px;height:44px;border-radius:8px;background:#f0f4f0;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .price{font-size:1rem;font-weight:700;color:#00b894;margin-left:auto;white-space:nowrap}
    .total-bar{background:linear-gradient(90deg,#00b894,#00cec9);color:white;border-radius:12px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:20px}
    .total-bar .lbl{font-size:1rem;opacity:.9}
    .total-bar .amt{font-size:1.5rem;font-weight:900}
    .resetbtn{margin-top:16px;padding:10px 22px;border-radius:20px;border:2px solid #dfe6e9;background:white;cursor:pointer;color:#636e72;font-family:'Lato',sans-serif;font-size:.95rem}
    .tip-box{background:#fff9e6;border-radius:14px;padding:20px;border:2px solid #fdcb6e;margin-top:16px}
    .tip-box ul{padding-left:22px;margin-top:10px}
    .tip-box li{font-size:1rem;color:#555;line-height:2}
    .foot{text-align:center;color:#aaa;font-size:.9rem;margin-top:28px}
  </style>
</head>

  </div>

  <div id="view-todo" class="view"></div>
  <div id="view-shop" class="view"></div>

  <p class="foot">🌿 Beplantingsplan Groenlostraat · Eindhoven · Gemaakt met Claude</p>
</div>

    style="display:block"/>
  <div class="${cls==='pcard-img'?'pcard-placeholder':'detail-placeholder'}"
    style="display:none;width:${size}px;height:${size}px">
    ${p.seasons.map(s=>EMOJI[s]).join("")}
  </div>`;
}

function showView(v) {
  document.querySelectorAll(".view").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.querySelectorAll(".tab").forEach(el=>{
    if(el.getAttribute("onclick").includes("'"+v+"'")) el.classList.add("active");
  });
  if(v==="todo")   renderTodo();
  if(v==="shop")   renderShop();
  if(v==="schema") renderSchema();
  if(v==="visual") renderVisual();
}

function filterSeason(s,btn) {
  currentSeason=s;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderGallery();
}

function renderGallery() {
  const plants = currentSeason==="Alle" ? PLANTS : PLANTS.filter(p=>p.seasons.includes(currentSeason));
  document.getElementById("plant-grid").innerHTML = plants.map(p=>`
    <div class="pcard" style="border:3px solid ${p.color}55" onclick="selectPlant(${p.id},'gallery')">
      ${imgOrPlaceholder(p,'pcard-img',200)}
      <div class="pinfo">
        <div class="pname" style="color:${p.color}">${p.name}</div>
        <div class="pmeta">🌸 ${p.bloom} &nbsp;·&nbsp; 📏 ${p.height}</div>
        <div>${p.seasons.map(s=>`<span class="sbadge" style="background:${SC[s]}">${s}</span>`).join("")}</div>
        <div class="ptip">💡 ${p.tip}</div>
      </div>
    </div>`).join("");
}

function selectPlant(id, ctx) {
  const p = PLANTS.find(x=>x.id===id);
  selectedPlant = (selectedPlant&&selectedPlant.id===id) ? null : p;
  const panel = document.getElementById(ctx==="gallery"?"detail-panel":"visual-detail");
  const hint  = document.getElementById("visual-hint");
  if (!selectedPlant) { panel.classList.remove("show"); if(hint) hint.style.display="block"; return; }
  if(hint) hint.style.display="none";
  panel.style.background = selectedPlant.color+"18";
  panel.style.border = "3px solid "+selectedPlant.color;
  panel.innerHTML = `
    ${imgOrPlaceholder(selectedPlant,'detail-img',140)}
    <div class="detail-info">
      <h2 style="color:${selectedPlant.color};margin-bottom:8px">${selectedPlant.name}</h2>
      <p style="margin-bottom:6px">🌸 <b>${selectedPlant.bloom}</b> &nbsp;·&nbsp; 📏 <b>${selectedPlant.height}</b></p>
      <p style="margin-bottom:10px">${selectedPlant.seasons.map(s=>`<span class="sbadge" style="background:${SC[s]}">${s}</span>`).join("")}</p>
      <p style="color:#444">💡 ${selectedPlant.tip}</p>
      <button class="closebtn" onclick="selectPlant(${selectedPlant.id},'${ctx}')">✕ Sluiten</button>
    </div>`;
  panel.classList.add("show");
}

function renderVisual() {
  const svg = document.getElementById("visual-svg");
  const rowBg = {achter:"#ffeaa7",midden:"#dfe6e9",voor:"#c8f7e4"};
  let h="";
  Object.entries(ROW_Y).forEach(([row,y])=>{
    h+=`<rect x="4" y="${y-52}" width="752" height="118" rx="10" fill="${rowBg[row]}" opacity="0.55"/>`;
    h+=`<text x="14" y="${y-30}" font-size="13" fill="#555" font-style="italic" font-family="Lato,sans-serif">${ROW_LABELS[row]}</text>`;
  });
  PLANTS.forEach(p=>{
    const x=44+p.pos*128, y=ROW_Y[p.row];
    h+=`<circle cx="${x}" cy="${y}" r="32" fill="${p.color}" opacity="0.92" stroke="white" stroke-width="2" style="cursor:pointer" onclick="selectPlant(${p.id},'visual')"/>`;
    const words=p.name.split(" ");
    h+=`<text x="${x}" y="${y-3}" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="Lato,sans-serif" style="pointer-events:none">${words[0]}</text>`;
    if(words[1]) h+=`<text x="${x}" y="${y+10}" text-anchor="middle" font-size="8" fill="white" font-family="Lato,sans-serif" style="pointer-events:none">${words[1]}</text>`;
    h+=`<text x="${x}" y="${y+52}" text-anchor="middle" font-size="10" fill="#555" font-family="Lato,sans-serif" style="pointer-events:none">${p.height}</text>`;
  });
  svg.innerHTML=h;
}

function renderSchema() {
  document.getElementById("view-schema").innerHTML = SCHEMA.map(s=>`
    <div class="scard" style="border-left:6px solid ${s.color}">
      <h2 style="color:${s.color};margin-bottom:14px">${s.when}</h2>
      <div class="sitems">
        ${s.ids.map(id=>{
          const p=PLANTS.find(x=>x.id===id); if(!p) return "";
          return `<div class="sitem">
            <img class="sitem-img" src="${p.img}" alt="${p.name}" onerror="this.style.display='none'"/>
            <span>${p.name}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="snote">ℹ️ ${s.note}</div>
    </div>`).join("")+`
  <div class="tip-box">
    <h3>💡 Tips voor volgend weekend</h3>
    <ul>
      <li>Eerst de bak volledig leegmaken en munt uitgraven inclusief wortels</li>
      <li>Verse potgrond of compost bijvullen (± 10 cm laag)</li>
      <li>Sterjasmijn netjes vastsnoeren langs het gaas</li>
      <li>De vroege planten direct aanplanten en goed aangieten</li>
      <li>Nepeta en Campanula kunnen ook meteen mee!</li>
    </ul>
  </div>`;
}

function checkSVG(){return`<svg width="14" height="14" viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

function toggleTodo(id){ todoDone[id]=!todoDone[id]; save("todo_done",todoDone); renderTodo(); }
function resetTodo(){ todoDone={}; save("todo_done",todoDone); renderTodo(); }
function renderTodo() {
  const total=TODO_ITEMS.length, done=TODO_ITEMS.filter(t=>todoDone[t.id]).length;
  const pct=Math.round((done/total)*100);
  const msg=done===0?"Nog niet begonnen — succes dit weekend! 💪":done===total?"Alles klaar! De border is klaar voor een prachtig seizoen 🎉🌸":`Lekker bezig! Nog ${total-done} taken te gaan 🌱`;
  const cats=[...new Set(TODO_ITEMS.map(t=>t.cat))];
  document.getElementById("view-todo").innerHTML=`
    <div class="progress-wrap">
      <div class="prog-top"><h2>✅ Voortgang</h2><span class="prog-score">${done} / ${total}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <p style="margin-top:8px;color:#636e72;font-size:.95rem">${msg}</p>
    </div>
    ${cats.map(cat=>`
      <div class="cathead">${cat}</div>
      ${TODO_ITEMS.filter(t=>t.cat===cat).map(t=>`
        <div class="crow${todoDone[t.id]?" done":""}" onclick="toggleTodo('${t.id}')">
          <div class="cb${todoDone[t.id]?" on":""}">
            ${todoDone[t.id]?checkSVG():""}
          </div>
          <div style="flex:1"><div class="ctxt">${t.text}</div><div class="csub">${t.sub}</div></div>
        </div>`).join("")}`).join("")}
    <button class="resetbtn" onclick="resetTodo()">🔄 Alles opnieuw instellen</button>`;
}

function toggleShop(id){ shopBought[id]=!shopBought[id]; save("shop_bought",shopBought); renderShop(); }
function resetShop(){ shopBought={}; save("shop_bought",shopBought); renderShop(); }
function renderShop() {
  const total=SHOP_ITEMS.reduce((a,s)=>a+s.price,0);
  const remaining=SHOP_ITEMS.filter(s=>!shopBought[s.id]).reduce((a,s)=>a+s.price,0);
  const bN=SHOP_ITEMS.filter(s=>shopBought[s.id]).length;
  const pct=Math.round((bN/SHOP_ITEMS.length)*100);
  const cats=[...new Set(SHOP_ITEMS.map(s=>s.cat))];
  document.getElementById("view-shop").innerHTML=`
    <div class="progress-wrap">
      <div class="prog-top"><h2>🛒 Boodschappenlijst</h2><span class="prog-score">${bN} / ${SHOP_ITEMS.length}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <p style="margin-top:8px;color:#636e72;font-size:.95rem">Totaal budget: <b>€${total.toFixed(2)}</b> &nbsp;·&nbsp; Nog te kopen: <b style="color:#e17055">€${remaining.toFixed(2)}</b></p>
    </div>
    ${cats.map(cat=>`
      <div class="cathead">${cat}</div>
      ${SHOP_ITEMS.filter(s=>s.cat===cat).map(s=>{
        const p = s.pid ? PLANTS.find(x=>x.id===s.pid) : null;
        return `<div class="shrow${shopBought[s.id]?" bought":""}" onclick="toggleShop('${s.id}')">
          <div class="cb${shopBought[s.id]?" on":""}">
            ${shopBought[s.id]?checkSVG():""}
          </div>
          ${p
            ? `<img class="shimg" src="${p.img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="shicon" style="display:none">🌿</div>`
            : `<div class="shicon">🛍</div>`
          }
          <div style="flex:1"><div class="ctxt">${s.name}</div><div class="csub">${s.qty}</div></div>
          <div class="price">€${s.price.toFixed(2)}</div>
        </div>`;
      }).join("")}`).join("")}
    <div class="total-bar">
      <div><div class="lbl">Totale investering</div><div class="amt">€${total.toFixed(2)}</div></div>
      <div style="text-align:right"><div class="lbl">Nog te kopen</div><div class="amt">€${remaining.toFixed(2)}</div></div>
    </div>
    <button class="resetbtn" onclick="resetShop()">🔄 Alles opnieuw instellen</button>`;
}

renderGallery();
renderVisual();
</script>
</body>
</html>
